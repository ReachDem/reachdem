name: Deploy Staging

on:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy-worker:
    name: Deploy Worker (staging)
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Cloudflare Worker to staging
        run: pnpm --filter @reachdem/workers exec wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke test worker health
        if: ${{ vars.STAGING_WORKER_URL != '' }}
        run: curl --fail --silent --show-error "${{ vars.STAGING_WORKER_URL }}/health"

  deploy-web:
    name: Deploy Web (staging)
    runs-on: ubuntu-latest
    environment: staging
    if: ${{ vars.VERCEL_PROJECT_ID_WEB != '' && vars.VERCEL_ORG_ID != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel environment
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN is not configured for staging; skipping web deploy."
            exit 0
          fi
          pnpm dlx vercel pull --cwd apps/web --yes --environment=preview --token="${VERCEL_TOKEN}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_WEB }}

      - name: Build Vercel project
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN is not configured for staging; skipping web build."
            exit 0
          fi
          pnpm dlx vercel build --cwd apps/web --token="${VERCEL_TOKEN}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_WEB }}

      - name: Deploy Vercel preview
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN is not configured for staging; skipping web deploy."
            exit 0
          fi
          pnpm dlx vercel deploy --cwd apps/web --prebuilt --token="${VERCEL_TOKEN}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_WEB }}

      - name: Smoke test Evolution webhook route
        if: ${{ vars.STAGING_APP_URL != '' }}
        run: |
          if [ -z "$EVOLUTION_WEBHOOK_SECRET" ]; then
            echo "EVOLUTION_WEBHOOK_SECRET is not configured for staging; skipping webhook smoke test."
            exit 0
          fi
          curl --fail --silent --show-error \
            -X POST \
            "${STAGING_APP_URL}/api/webhooks/evolution?secret=${EVOLUTION_WEBHOOK_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{"event":"PING","instance":"staging-smoke"}'
        env:
          STAGING_APP_URL: ${{ vars.STAGING_APP_URL }}
          EVOLUTION_WEBHOOK_SECRET: ${{ secrets.EVOLUTION_WEBHOOK_SECRET }}
