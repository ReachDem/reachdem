name: Deploy Production

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-worker:
    name: Deploy Worker (production)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Cloudflare Worker to production
        run: pnpm --filter @reachdem/workers exec wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke test worker health
        if: ${{ vars.PRODUCTION_WORKER_URL != '' }}
        run: curl --fail --silent --show-error "${{ vars.PRODUCTION_WORKER_URL }}/health"

  deploy-web:
    name: Deploy Web (production)
    runs-on: ubuntu-latest
    environment: production
    if: ${{ secrets.VERCEL_TOKEN != '' && vars.VERCEL_PROJECT_ID_WEB != '' && vars.VERCEL_ORG_ID != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel environment
        run: pnpm dlx vercel pull --cwd apps/web --yes --environment=production --token="${VERCEL_TOKEN}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_WEB }}

      - name: Build Vercel project
        run: pnpm dlx vercel build --cwd apps/web --prod --token="${VERCEL_TOKEN}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_WEB }}

      - name: Deploy Vercel production
        run: pnpm dlx vercel deploy --cwd apps/web --prebuilt --prod --token="${VERCEL_TOKEN}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_WEB }}

      - name: Smoke test Evolution webhook route
        if: ${{ vars.PRODUCTION_APP_URL != '' && secrets.EVOLUTION_WEBHOOK_SECRET != '' }}
        run: >
          curl --fail --silent --show-error
          -X POST
          "${{ vars.PRODUCTION_APP_URL }}/api/webhooks/evolution?secret=${{ secrets.EVOLUTION_WEBHOOK_SECRET }}"
          -H "Content-Type: application/json"
          -d '{"event":"PING","instance":"production-smoke"}'
