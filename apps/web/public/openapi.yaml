openapi: 3.1.0
info:
  title: ReachDem Public API
  version: 1.0.0
  description: |
    Public V1 contract for ReachDem client integrations.

    This specification intentionally documents only the external client-facing
    API surface. Internal dashboard routes, provider orchestration internals,
    and infrastructure-only webhook endpoints are excluded.

servers:
  - url: http://localhost:3000/api
    description: Local development

tags:
  - name: Messages
  - name: Contacts
  - name: Groups
  - name: Segments
  - name: Campaigns
  - name: Billing

security:
  - bearerAuth: []

paths:
  /v1/messages/send:
    post:
      tags: [Messages]
      summary: Send a transactional message
      description: >
        Unified transactional messaging endpoint for SMS and email.
        This operation is idempotent and requires the `Idempotency-Key` header.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          description: Idempotent replay
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResponse"
        "201":
          description: Message accepted for processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/messages:
    get:
      tags: [Messages]
      summary: List messages
      parameters:
        - $ref: "#/components/parameters/Status"
        - $ref: "#/components/parameters/FromDateTime"
        - $ref: "#/components/parameters/ToDateTime"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Messages list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/messages/{id}:
    get:
      tags: [Messages]
      summary: Get message by ID
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Message summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/contacts:
    get:
      tags: [Contacts]
      summary: List contacts
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - name: q
          in: query
          schema:
            type: string
          description: Search by name, phone, or email
      responses:
        "200":
          description: Contacts list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Contacts]
      summary: Create contact
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactRequest"
      responses:
        "200":
          description: Idempotent replay
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "201":
          description: Contact created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/contacts/{id}:
    get:
      tags: [Contacts]
      summary: Get contact
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Contact details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags: [Contacts]
      summary: Update contact
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContactRequest"
      responses:
        "200":
          description: Contact updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Contacts]
      summary: Delete contact
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "204":
          description: Contact deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/groups:
    get:
      tags: [Groups]
      summary: List groups
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Groups list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Groups]
      summary: Create group
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupWriteRequest"
      responses:
        "200":
          description: Idempotent replay
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "201":
          description: Group created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/groups/{id}:
    get:
      tags: [Groups]
      summary: Get group
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Group details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags: [Groups]
      summary: Update group
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupWriteRequest"
      responses:
        "200":
          description: Group updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Groups]
      summary: Delete group
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "204":
          description: Group deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/groups/{id}/contacts:
    get:
      tags: [Groups]
      summary: List contacts in a group
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Group members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Groups]
      summary: Add contacts to a group
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupContactsWriteRequest"
      responses:
        "200":
          description: Contacts added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupContactsWriteResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Groups]
      summary: Remove contacts from a group
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupContactsWriteRequest"
      responses:
        "200":
          description: Contacts removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupContactsWriteResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/segments:
    get:
      tags: [Segments]
      summary: List segments
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Segments list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SegmentListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Segments]
      summary: Create segment
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SegmentWriteRequest"
      responses:
        "200":
          description: Idempotent replay
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Segment"
        "201":
          description: Segment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Segment"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/segments/preview:
    post:
      tags: [Segments]
      summary: Preview segment definition
      description: Preview matching contacts before creating or updating a segment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SegmentPreviewRequest"
      responses:
        "200":
          description: Preview results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/segments/{id}:
    get:
      tags: [Segments]
      summary: Get segment
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Segment details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Segment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags: [Segments]
      summary: Update segment
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SegmentWriteRequest"
      responses:
        "200":
          description: Segment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Segment"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Segments]
      summary: Delete segment
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "204":
          description: Segment deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/segments/{id}/contacts:
    get:
      tags: [Segments]
      summary: List contacts matching a segment
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Segment contacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/campaigns:
    get:
      tags: [Campaigns]
      summary: List campaigns
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Campaigns list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Campaigns]
      summary: Create draft campaign
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignRequest"
      responses:
        "200":
          description: Idempotent replay
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "201":
          description: Campaign created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/campaigns/{id}:
    get:
      tags: [Campaigns]
      summary: Get campaign
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Campaign details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags: [Campaigns]
      summary: Update draft campaign
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCampaignRequest"
      responses:
        "200":
          description: Campaign updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/CampaignInvalidStatus"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Campaigns]
      summary: Delete draft campaign
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "204":
          description: Campaign deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/CampaignInvalidStatus"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/campaigns/{id}/audience:
    get:
      tags: [Campaigns]
      summary: List campaign audience sources
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Audience sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CampaignAudience"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Campaigns]
      summary: Replace campaign audience
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetCampaignAudienceRequest"
      responses:
        "200":
          description: Idempotent replay
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CampaignAudience"
        "201":
          description: Audience replaced
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CampaignAudience"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/CampaignInvalidStatus"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/campaigns/{id}/launch:
    post:
      tags: [Campaigns]
      summary: Launch draft campaign
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Idempotent replay
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignLaunchResponse"
        "201":
          description: Campaign launch accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignLaunchResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/CampaignInvalidStatus"
        "422":
          $ref: "#/components/responses/InsufficientBalance"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/campaigns/{id}/stats:
    get:
      tags: [Campaigns]
      summary: Get campaign stats
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Campaign statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignStats"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/workspace/billing:
    get:
      tags: [Billing]
      summary: Get workspace billing summary
      description: >
        Public read-only billing summary related to messaging usage and
        available balance for the authenticated workspace.
      responses:
        "200":
          description: Billing summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
      description: Client-generated key used to make write operations idempotent.
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Resource identifier.
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
    Status:
      name: status
      in: query
      schema:
        type: string
        enum: [scheduled, queued, sending, sent, failed]
    FromDateTime:
      name: from
      in: query
      schema:
        type: string
        format: date-time
    ToDateTime:
      name: to
      in: query
      schema:
        type: string
        format: date-time

  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: unauthorized
              message: Unauthorized
              details: {}
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: not_found
              message: Resource not found
              details: {}
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: validation_error
              message: Request validation failed
              details: {}
    IdempotencyConflict:
      description: Idempotency key reused with a different semantic payload
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: idempotency_conflict
              message: Idempotency key conflict
              details: {}
    CampaignInvalidStatus:
      description: Campaign is not in a mutable or launchable state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: campaign_invalid_status
              message: Campaign is not in a valid status for this operation
              details: {}
    InsufficientBalance:
      description: Insufficient workspace balance or quota
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: insufficient_balance
              message: Insufficient balance
              details: {}
    UnprocessableEntity:
      description: Request is well-formed but cannot be processed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: internal_error
              message: Internal server error
              details: {}

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
