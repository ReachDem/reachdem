openapi: 3.1.0
info:
  title: ReachDem API
  description: Monorepo Backend API Operations for Contacts, Groups, and Segments management.
  version: 1.0.0
servers:
  - url: http://localhost:3000/api/v1
    description: Local Development Server

security:
  - cookieAuth: []

paths:
  /contacts:
    get:
      summary: List all Contacts
      description: Returns a paginated list of contacts for the active workspace.
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: q
          description: Search term (name, phone, email)
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedContacts"

  /contacts/{id}:
    get:
      summary: Get Contact by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Contact Details
    patch:
      summary: Update a Contact
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Any sub-field from CreateContactDto
      responses:
        "200":
          description: Updated Contact
    delete:
      summary: Soft Delete Contact
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Successfully deleted

    post:
      summary: Create a Contact
      description: Creates a new contact in the active workspace. Requires at least an email or phone number.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactDto"
      responses:
        "201":
          description: Contact Created

  /groups:
    get:
      summary: List all Groups
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: OK
    post:
      summary: Create a Group
      description: Create a stationary static group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupDto"
      responses:
        "201":
          description: Group Created

  /groups/{id}:
    get:
      summary: Get Group Details
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Group Entity
    patch:
      summary: Update Group
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupDto"
      responses:
        "200":
          description: Group Updated
    delete:
      summary: Delete Group
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Group Removed

  /groups/{id}/members:
    post:
      summary: Add members to group
      description: Bulk add up to 500 contacts at a time to a specified group
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contact_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        "201":
          description: Members correctly added
    delete:
      summary: Remove members from group
      description: Bulk remove up to 500 contacts from a group
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contact_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        "204":
          description: Members properly stripped

  /groups/{id}/contacts:
    get:
      summary: Get Paginated Members
      description: List paginated contacts that reside exclusively inside this group definition.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: page
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Members Listed Here

  /segments:
    post:
      summary: Create a Segment (Dynamic Audience)
      description: Creates a Segment evaluating a recursive JSON logic tree securely.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSegmentDto"
      responses:
        "201":
          description: Segment Created

  /segments/{id}:
    get:
      summary: Get Segment Details
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Segment Information
    delete:
      summary: Delete Segment permanently
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Gone

  /segments/{id}/contacts:
    get:
      summary: Evaluate Dynamic Audience
      description: Evaluates the segments JSONAST locally against the Database and fetches a mapped list of compliant Contact identifiers.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: cursor
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Evaluated Segments List Response

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: better-auth.session_token
  schemas:
    PaginatedContacts:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Contact"
        metadata:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
            limit:
              type: integer
            totalPages:
              type: integer

    Contact:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          nullable: true
        phoneE164:
          type: string
          nullable: true
        customFields:
          type: object
          additionalProperties: true

    CreateContactDto:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          example: "john@example.com"
        phoneE164:
          type: string
          example: "+1234567890"
        customFields:
          type: object
          description: Valid JSON Hashmap corresponding to Organization Definitions
          example: { vip_rank: "Gold" }

    CreateGroupDto:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "All Stars"
        description:
          type: string
          example: "The premium member tier limit."

    CreateSegmentDto:
      type: object
      required:
        - name
        - definition
      properties:
        name:
          type: string
          example: "Gold Members living in Paris"
        definition:
          type: object
          description: "A recursive Logical Tree representing Prisma clauses"
          example:
            op: "AND"
            children:
              - field: "city"
                operator: "eq"
                value: "Paris"
                type: "string"
              - field: "custom.vip_rank"
                operator: "eq"
                value: "Gold"
                type: "string"
