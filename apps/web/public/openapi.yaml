          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
      example:
        id: seg_01hr8mf3w7v2t54m31kav4mecx
        name: "Clients inactifs depuis 30 jours"
        description: "Contacts sans achat recent a relancer avec une offre de retour."
        definition:
          op: AND
          children:
            - field: city
              operator: eq
              type: string
              value: Douala
            - field: last_order_days_ago
              operator: gte
              type: number
              value: 30
